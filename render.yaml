services:
  # Backend Web Service
  - type: web
    name: price-compare-backend
    env: node
    plan: free
    rootDir: price-compare-hub/backend
    buildCommand: npm install
    startCommand: node index.js
    envVars:
      - key: PORT
        value: 5000
      - key: MONGO_URI
        sync: false # Connect your own MongoDB Atlas URI in the Render Dashboard env variables
      - key: JWT_SECRET
        generateValue: true

  # Frontend Static Site
  - type: web
    name: price-compare-frontend
    env: static
    plan: free
    rootDir: price-compare-hub/frontend
    buildCommand: npm install && npm run build
    publishDir: dist
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
